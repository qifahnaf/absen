<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitung Keterlambatan</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f4f7;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#2c3e50;
}

label{
font-weight:bold;
font-size:14px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.jam{
display:flex;
gap:10px;
}

button{
width:100%;
padding:12px;
background:#2e86de;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b4f72;
}

#hasil{
margin-top:15px;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
font-size:16px;
}

.tepat{
background:#d4edda;
color:#155724;
}

.telat{
background:#f8d7da;
color:#721c24;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Hitung Keterlambatan</h2>

<label>Jam Ketentuan</label>
<div class="jam">
<input type="number" id="ketentuanJam" placeholder="Jam">
<input type="number" id="ketentuanMenit" placeholder="Menit">
</div>

<label>Jam Masuk</label>
<div class="jam">
<input type="number" id="pegawaiJam" placeholder="Jam">
<input type="number" id="pegawaiMenit" placeholder="Menit">
</div>

<button onclick="hitung()">Hitung</button>

<div id="hasil"></div>

</div>
</div>

<script>

function hitung(){

let kJam=document.getElementById("ketentuanJam").value;
let kMenit=document.getElementById("ketentuanMenit").value;

let pJam=document.getElementById("pegawaiJam").value;
let pMenit=document.getElementById("pegawaiMenit").value;

if(kJam=="" || kMenit=="" || pJam=="" || pMenit==""){
alert("Mohon isi semua kolom waktu");
return;
}

let menitKetentuan=parseInt(kJam)*60+parseInt(kMenit);
let menitPegawai=parseInt(pJam)*60+parseInt(pMenit);

let terlambat=menitPegawai-menitKetentuan;

let hasil=document.getElementById("hasil");

if(terlambat<=0){

hasil.className="tepat";
hasil.innerHTML="✅ Tidak terlambat";

}else{

hasil.className="telat";
hasil.innerHTML="⏰ Terlambat "+terlambat+" menit";

}

}

</script>

</body>
</html>
