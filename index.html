<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitung Keterlambatan</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f4f7;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#2c3e50;
}

label{
font-weight:bold;
font-size:14px;
}

.jam{
display:flex;
align-items:center;
gap:8px;
margin-bottom:15px;
}

.jam input{
width:60px;
padding:10px;
font-size:18px;
text-align:center;
border-radius:8px;
border:1px solid #ccc;
}

.titik{
font-size:20px;
font-weight:bold;
}

button{
width:100%;
padding:12px;
background:#2e86de;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b4f72;
}

#hasil{
margin-top:15px;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
font-size:16px;
}

.tepat{
background:#d4edda;
color:#155724;
}

.telat{
background:#f8d7da;
color:#721c24;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Hitung Keterlambatan</h2>

<label>Jam Ketentuan</label>
<div class="jam">
<input type="text" id="kJam" maxlength="2" oninput="formatJam(this,'kMenit')">
<span class="titik">:</span>
<input type="text" id="kMenit" maxlength="2" oninput="formatMenit(this)">
</div>

<label>Jam Masuk</label>
<div class="jam">
<input type="text" id="pJam" maxlength="2" oninput="formatJam(this,'pMenit')">
<span class="titik">:</span>
<input type="text" id="pMenit" maxlength="2" oninput="formatMenit(this)">
</div>

<button onclick="hitung()">Hitung</button>

<div id="hasil"></div>

<hr style="margin:25px 0">

<h2>Hitung Pulang Lebih Awal</h2>

<label>Jam Ketentuan Pulang</label>
<div class="jam">
<input type="text" id="pulangKetJam" maxlength="2" oninput="formatJam(this,'pulangKetMenit')">
<span class="titik">:</span>
<input type="text" id="pulangKetMenit" maxlength="2" oninput="formatMenit(this)">
</div>

<label>Jam Pulang Pegawai</label>
<div class="jam">
<input type="text" id="pegawaiPulangJam" maxlength="2" oninput="formatJam(this,'pegawaiPulangMenit')">
<span class="titik">:</span>
<input type="text" id="pegawaiPulangMenit" maxlength="2" oninput="formatMenit(this)">
</div>

<button onclick="hitungPulang()">Hitung Pulang Awal</button>

<div id="hasilPulang"></div>

  <hr style="margin:25px 0">
</div>
</div>

<script>

function hanyaAngka(input){
input.value=input.value.replace(/[^0-9]/g,'');
}

function formatJam(input,next){

hanyaAngka(input);

if(input.value.length==1){
if(parseInt(input.value)>2){
input.value="0"+input.value;
document.getElementById(next).focus();
}
}

if(input.value.length==2){
document.getElementById(next).focus();
}

}

function formatMenit(input){

hanyaAngka(input);

if(input.value.length==1){
if(parseInt(input.value)>5){
input.value="0"+input.value;
}
}

}

function hitung(){

let kJam=document.getElementById("kJam").value;
let kMenit=document.getElementById("kMenit").value;

let pJam=document.getElementById("pJam").value;
let pMenit=document.getElementById("pMenit").value;

if(kJam==""||kMenit==""||pJam==""||pMenit==""){
alert("Isi semua waktu");
return;
}

let menitKetentuan=parseInt(kJam)*60+parseInt(kMenit);
let menitPegawai=parseInt(pJam)*60+parseInt(pMenit);

let terlambat=menitPegawai-menitKetentuan;

let hasil=document.getElementById("hasil");

if(terlambat<=0){

hasil.className="tepat";
hasil.innerHTML="✅ Tidak terlambat";

}else{

hasil.className="telat";
hasil.innerHTML="⏰ Terlambat "+terlambat+" menit";

}

}




function hitungPulang(){

let kJam=document.getElementById("pulangKetJam").value;
let kMenit=document.getElementById("pulangKetMenit").value;

let pJam=document.getElementById("pegawaiPulangJam").value;
let pMenit=document.getElementById("pegawaiPulangMenit").value;

if(kJam==""||kMenit==""||pJam==""||pMenit==""){
alert("Isi semua waktu");
return;
}

let menitKetentuan=parseInt(kJam)*60+parseInt(kMenit);
let menitPegawai=parseInt(pJam)*60+parseInt(pMenit);

let lebihAwal=menitKetentuan-menitPegawai;

let hasil=document.getElementById("hasilPulang");

if(lebihAwal<=0){

hasil.className="tepat";
hasil.innerHTML="✅ Tidak pulang lebih awal";

}else{

hasil.className="telat";
hasil.innerHTML="⏰ Pulang lebih awal "+lebihAwal+" menit";

}

}
























  
</script>

</body>
</html>
