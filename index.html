<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Hitung Keterlambatan</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f4f7;
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#2c3e50;
}

label{
font-weight:bold;
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.jam{
display:flex;
gap:5px;
}

button{
width:100%;
padding:12px;
background:#2e86de;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b4f72;
}

#hasil{
margin-top:15px;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:bold;
font-size:16px;
}

.tepat{
background:#d4edda;
color:#155724;
}

.telat{
background:#f8d7da;
color:#721c24;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Absensi Keterlambatan</h2>

<label>Nama Pegawai</label>
<input type="text" id="nama" placeholder="Masukkan nama pegawai">

<label>Ketentuan Jam Masuk</label>
<div class="jam">
<select id="jamKetentuanJam"></select>
<select id="jamKetentuanMenit"></select>
</div>

<label>Jam Masuk Pegawai</label>
<div class="jam">
<select id="jamPegawaiJam"></select>
<select id="jamPegawaiMenit"></select>
</div>

<button onclick="hitung()">Hitung Keterlambatan</button>

<div id="hasil"></div>

</div>
</div>

<script>

function isiJam(){

for(let i=0;i<24;i++){

let jam=i.toString().padStart(2,'0');

document.getElementById("jamKetentuanJam").innerHTML+=`<option value="${jam}">${jam}</option>`;
document.getElementById("jamPegawaiJam").innerHTML+=`<option value="${jam}">${jam}</option>`;

}

for(let i=0;i<60;i++){

let menit=i.toString().padStart(2,'0');

document.getElementById("jamKetentuanMenit").innerHTML+=`<option value="${menit}">${menit}</option>`;
document.getElementById("jamPegawaiMenit").innerHTML+=`<option value="${menit}">${menit}</option>`;

}

}

isiJam();


function hitung(){

let nama=document.getElementById("nama").value;

let kJam=document.getElementById("jamKetentuanJam").value;
let kMenit=document.getElementById("jamKetentuanMenit").value;

let pJam=document.getElementById("jamPegawaiJam").value;
let pMenit=document.getElementById("jamPegawaiMenit").value;

if(nama==""){
alert("Mohon isi nama pegawai");
return;
}

let menitKetentuan=parseInt(kJam)*60+parseInt(kMenit);
let menitPegawai=parseInt(pJam)*60+parseInt(pMenit);

let terlambat=menitPegawai-menitKetentuan;

let hasil=document.getElementById("hasil");

if(terlambat<=0){

hasil.className="tepat";
hasil.innerHTML="✅ "+nama+" tepat waktu / tidak terlambat";

}else{

hasil.className="telat";
hasil.innerHTML="⏰ "+nama+" terlambat "+terlambat+" menit";

}

}

</script>

</body>
</html>
